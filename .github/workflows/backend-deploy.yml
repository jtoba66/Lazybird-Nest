name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "docker-compose.yml"
      - "Caddyfile"
      - ".github/workflows/backend-deploy.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Build and Push Docker Image
        # Note: In a real scenario, you'd push to a registry like Docker Hub or GitHub Packages.
        # For simplicity here, we'll build and then SSH to the server to pull/rebuild.
        run: |
          echo "Building backend..."
          cd server
          # We use doppler run to ensure any build-time secrets are available if needed
          DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }} doppler run -- docker build -t nest-backend .

      - name: Deploy to Contabo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          # If you use a password instead of key, use password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Fail the whole deploy if ANY command fails (previously a rejected `git pull`
            # was ignored and the box silently rebuilt stale code).
            set -e

            cd /opt/nest

            export DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }}

            # Force the working tree to EXACTLY match origin/main. A plain `git pull` is
            # rejected whenever the box has local edits (which had accumulated from manual
            # hotfixes), so deploys silently no-op'd. reset --hard + clean make the box
            # authoritative from git on every deploy.
            #
            # CRITICAL: never clean `uploads/` — it holds ~2GB of real user file storage
            # (obsideo-bundle + chunks). It is untracked (not gitignored), so it MUST be
            # excluded explicitly. `.env` is gitignored so clean already skips it.
            git fetch origin main
            git clean -fd -e uploads
            git reset --hard origin/main

            # Ensure upload directory exists and has correct permissions for Node (1000:1000)
            mkdir -p /opt/nest/uploads
            chown -R 1000:1000 /opt/nest/uploads
            chmod 775 /opt/nest/uploads

            # Rebuild and restart containers
            # We use --build to ensure the Dockerfile changes are picked up
            docker compose up -d --build --remove-orphans

            # Prune old images to save space
            docker image prune -f
